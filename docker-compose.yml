
services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/bigredmacro
    volumes:
      - neo4j_data:/data

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=bigredmacro.settings
      - MONGODB_URI=mongodb://mongo:27017/bigredmacro
      - REDIS_URL=redis://redis:6379/0
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=bigredmacro
    depends_on:
      - mongo
      - redis
      - neo4j

  celery:
    build: ./backend
    command: celery -A bigredmacro worker -l info -B
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=bigredmacro.settings
      - MONGODB_URI=mongodb://mongo:27017/bigredmacro
      - REDIS_URL=redis://redis:6379/0
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=bigredmacro
    depends_on:
      - mongo
      - redis
      - neo4j

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=/api
      - PROXY_TARGET=http://backend:8000

volumes:
  mongo_data:
  neo4j_data:
