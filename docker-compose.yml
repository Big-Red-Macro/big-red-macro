
services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=bigredmacro.settings
      - MONGODB_URI=mongodb://mongo:27017/bigredmacro
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongo
      - redis

  celery:
    build: ./backend
    command: celery -A bigredmacro worker -l info -B
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=bigredmacro.settings
      - MONGODB_URI=mongodb://mongo:27017/bigredmacro
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongo
      - redis

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=/api
      - PROXY_TARGET=http://backend:8000

volumes:
  mongo_data:
